# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    # Permissive BSD/zlib-style license of the bzip2 reference implementation;
    # required by libbz2-rs-sys (the bzip2 crate's decoder backend). No copyleft.
    "bzip2-1.0.6",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    # webpki-root-certs (transitive via rustls-platform-verifier) uses CDLA-Permissive-2.0,
    # a permissive open data license equivalent in intent to MIT/Apache-2.0 — not GPL/LGPL.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
